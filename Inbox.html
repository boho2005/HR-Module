<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox — Mockup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    min-height: 100vh;
  }

  .card {
    background: #ffffff;
    border-radius: 12px;
    border: 1px solid #e0e0e0;
    width: 100%;
    max-width: 860px;
    overflow: hidden;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid #e0e0e0;
    background: #fafafa;
  }
  .card-header h1 { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  .card-header .sub { font-size: 12px; color: #888; margin-top: 2px; }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .link-btn {
    background: none; border: none; font-family: inherit; font-size: 12.5px; font-weight: 500;
    color: #1a73e8; cursor: pointer; padding: 4px 6px; border-radius: 6px;
  }
  .link-btn:hover { background: #eef4fe; }

  /* Filter tabs */
  .filter-bar { display: flex; gap: 8px; padding: 14px 24px 0; flex-wrap: wrap; }
  .filter-tab {
    font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 8px; cursor: pointer;
    border: 1px solid #d5d5d5; background: #fff; color: #555; font-family: inherit;
    transition: background .15s, color .15s, border-color .15s; display: inline-flex; align-items: center; gap: 7px;
  }
  .filter-tab:hover { background: #f5f5f5; }
  .filter-tab.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }
  .filter-tab .pill { font-size: 11px; font-weight: 600; background: rgba(0,0,0,.08); border-radius: 20px; padding: 0 7px; min-width: 18px; text-align: center; }
  .filter-tab.active .pill { background: rgba(255,255,255,.25); }

  /* Task list */
  .task-list { padding: 8px 12px 14px; }
  .task {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 12px; border-radius: 10px; position: relative;
    transition: background .12s;
  }
  .task:hover { background: #fafcff; }
  .task + .task { border-top: 1px solid #f2f2f2; }
  .task.read { opacity: .62; }

  .unread-dot {
    position: absolute; left: 2px; top: 22px; width: 7px; height: 7px; border-radius: 50%;
    background: #1a73e8;
  }
  .task.read .unread-dot { background: transparent; }

  .task-icon {
    width: 40px; height: 40px; min-width: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .task-icon svg { width: 20px; height: 20px; stroke: currentColor; }
  .ic-leave    { background: #e8f0fe; color: #1a73e8; }
  .ic-goal     { background: #ebe7fb; color: #6d4bd8; }
  .ic-birthday { background: #fdeaf3; color: #d63384; }
  .ic-doc      { background: #fff2df; color: #d98a0b; }
  .ic-recruit  { background: #e6f6ec; color: #1e9e52; }
  .ic-anniv    { background: #e6f8fc; color: #0e8fac; }

  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .task-desc { font-size: 13px; color: #667085; margin-top: 3px; line-height: 1.45; }
  .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 7px; flex-wrap: wrap; }
  .chip {
    font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: .03em;
  }
  .chip.leave    { background: #e8f0fe; color: #1a73e8; }
  .chip.goal     { background: #ebe7fb; color: #6d4bd8; }
  .chip.birthday { background: #fdeaf3; color: #d63384; }
  .chip.doc      { background: #fff2df; color: #d98a0b; }
  .chip.recruit  { background: #e6f6ec; color: #1e9e52; }
  .chip.anniv    { background: #e6f8fc; color: #0e8fac; }
  .task-time { font-size: 11.5px; color: #98a2b3; }

  .task-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; align-self: center; }
  .mini-btn {
    font-size: 12px; font-weight: 500; padding: 6px 13px; border-radius: 7px; cursor: pointer;
    border: 1px solid #d5d5d5; background: #fff; color: #444; font-family: inherit;
    transition: background .15s, border-color .15s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
  }
  .mini-btn:hover { background: #f5f5f5; }
  .mini-btn.primary { color: #1a73e8; border-color: #bcd6f7; }
  .mini-btn.primary:hover { background: #e8f0fe; }
  .mini-btn svg { width: 13px; height: 13px; stroke: currentColor; }

  .empty-state { text-align: center; color: #98a2b3; padding: 48px 24px; }
  .empty-state svg { width: 40px; height: 40px; stroke: #cfd6df; margin-bottom: 10px; }
  .empty-state div { font-size: 13px; }

  @media (max-width: 620px) {
    .task-actions { flex-direction: column; align-items: stretch; }
    .mini-btn { justify-content: center; }
  }

  /* ===== Valleysoft sidebar shell (shared) ===== */
  :root{
    --vs-navy-1:#0a1a2f; --vs-navy-2:#0d2740;
    --vs-teal:#2ec5e6; --vs-teal-soft:#7fdcef; --vs-blue:#1a73e8;
  }
  .app{ display:flex; min-height:100vh; }
  .sidebar{
    width:244px; min-width:244px;
    background:linear-gradient(180deg,var(--vs-navy-2) 0%,var(--vs-navy-1) 100%);
    color:#cdd7e3; display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh; z-index:200;
  }
  .brand{ display:flex; align-items:center; gap:11px; padding:20px 20px 18px; }
  .brand-mark{ width:34px; height:34px; flex-shrink:0; }
  .brand-text{ line-height:1; }
  .brand-name{ font-size:17px; font-weight:700; letter-spacing:-0.02em; color:#fff; }
  .brand-name .soft{ color:var(--vs-teal); }
  .brand-sub{ font-size:8.5px; letter-spacing:0.18em; text-transform:uppercase; color:#6b8299; margin-top:3px; font-weight:600; }
  .nav-section{ font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:#55708a; font-weight:600; padding:8px 22px 6px; }
  .nav{ padding:6px 12px; display:flex; flex-direction:column; gap:2px; }
  .nav-item{ display:flex; align-items:center; gap:11px; padding:9px 11px; border-radius:8px; font-size:13.5px; font-weight:500; color:#b6c4d4; text-decoration:none; cursor:pointer; position:relative; transition:background .14s,color .14s; }
  .nav-item svg{ width:17px; height:17px; stroke:currentColor; flex-shrink:0; opacity:.9; }
  .nav-item:hover{ background:rgba(255,255,255,.06); color:#eaf1f8; }
  .nav-item.active{ background:rgba(46,197,230,.14); color:#fff; }
  .nav-item.active::before{ content:''; position:absolute; left:-12px; top:8px; bottom:8px; width:3px; border-radius:0 3px 3px 0; background:var(--vs-teal); }
  .nav-item.active svg{ opacity:1; stroke:var(--vs-teal-soft); }
  .nav-badge{ margin-left:auto; font-size:10.5px; font-weight:600; background:rgba(46,197,230,.18); color:var(--vs-teal-soft); padding:1px 7px; border-radius:20px; min-width:20px; text-align:center; }
  .nav-item.active .nav-badge{ background:var(--vs-teal); color:#06202b; }
  .sidebar-spacer{ flex:1; }
  .me{ display:flex; align-items:center; gap:10px; margin:12px; padding:10px 11px; border-radius:10px; background:rgba(255,255,255,.05); }
  .me-av{ width:34px; height:34px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:#fff; background:#2e7d32; }
  .me-text{ line-height:1.3; min-width:0; }
  .me-name{ font-size:13px; font-weight:600; color:#eef3f8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .me-role{ font-size:11px; color:#7d93a8; }
  .me-cog{ margin-left:auto; color:#6b8299; display:flex; }
  .me-cog svg{ width:16px; height:16px; stroke:currentColor; }
  .main{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .menu-toggle{ display:none; width:38px; height:38px; border-radius:9px; background:#fff; border:1px solid #e0e0e0; align-items:center; justify-content:center; cursor:pointer; }
  .menu-toggle svg{ width:20px; height:20px; stroke:#475467; }
  .vs-toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:#101828; color:#fff; font-size:13px; font-weight:500; padding:11px 18px; border-radius:10px; box-shadow:0 8px 28px rgba(0,0,0,.25); display:flex; align-items:center; gap:9px; opacity:0; pointer-events:none; transition:opacity .22s,transform .22s; z-index:900; }
  .vs-toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .vs-toast svg{ width:16px; height:16px; stroke:var(--vs-teal); stroke-width:2.4; }

  /* Page layout */
  .topbar{ display:flex; align-items:center; gap:14px; padding:18px 24px; }
  .page-title{ font-size:20px; font-weight:700; letter-spacing:-.02em; color:#1a1a1a; }
  .emp-scroll{ flex:1; overflow:auto; padding:12px 24px 48px; display:flex; justify-content:center; align-items:flex-start; }

  @media (max-width:760px){
    .sidebar{ position:fixed; left:0; top:0; transform:translateX(-100%); transition:transform .25s; }
    .sidebar.open{ transform:translateX(0); }
    .menu-toggle{ display:flex; }
    .emp-scroll{ padding:8px 14px 40px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ══════════════════ SIDEBAR ══════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-label="Valleysoft">
        <g fill="#ffffff">
          <rect x="2"  y="4"  width="19" height="3.6" rx="1.8"/>
          <rect x="5"  y="10" width="16" height="3.6" rx="1.8"/>
          <rect x="8"  y="16" width="13" height="3.6" rx="1.8"/>
          <rect x="11" y="22" width="10" height="3.6" rx="1.8"/>
        </g>
        <path d="M16 26 L21.5 33 L38 5 L32.5 4 Z" fill="#2ec5e6"/>
      </svg>
      <div class="brand-text">
        <div class="brand-name">Valley<span class="soft">soft</span></div>
        <div class="brand-sub">HR Suite</div>
      </div>
    </div>

    <div class="nav-section">Workspace</div>
    <nav class="nav">
      <a class="nav-item" href="Dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        Dashboard
      </a>
      <a class="nav-item active" href="Inbox.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9"><path d="M4 5h16v14H4z"/><path d="M4 8l8 5 8-5"/></svg>
        Inbox <span class="nav-badge" id="nav-inbox-badge">3</span>
      </a>
      <a class="nav-item" href="Employees.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 5.5a3 3 0 0 1 0 5.6"/><path d="M18 20a5 5 0 0 0-3-4.6"/></svg>
        Employees
      </a>
      <a class="nav-item" href="Organization_Chart.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9"><rect x="9" y="3" width="6" height="5" rx="1"/><rect x="3" y="16" width="6" height="5" rx="1"/><rect x="15" y="16" width="6" height="5" rx="1"/><path d="M12 8v4M6 16v-2h12v2M12 12v2"/></svg>
        Organization Chart
      </a>
      <a class="nav-item" href="Leaves.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>
        Leaves <span class="nav-badge">5</span>
      </a>
      <a class="nav-item" href="Goals.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="0.8" fill="currentColor"/></svg>
        Goals
      </a>
      <a class="nav-item" href="Recruitment.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9"><circle cx="11" cy="11" r="6.5"/><path d="M16 16l4.5 4.5"/></svg>
        Recruitment <span class="nav-badge">6</span>
      </a>
      <a class="nav-item" href="Documents.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4M9 13h6M9 17h6"/></svg>
        Documents <span class="nav-badge">6</span>
      </a>
    </nav>

    <div class="sidebar-spacer"></div>

    <div class="me">
      <div class="me-av">HI</div>
      <div class="me-text">
        <div class="me-name">Hany Ibrahim</div>
        <div class="me-role">HR Manager</div>
      </div>
      <span class="me-cog"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.9"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9L17 7M7 17l-2.1 2.1"/></svg></span>
    </div>
  </aside>

  <!-- ══════════════════ MAIN ══════════════════ -->
  <main class="main">
    <div class="topbar">
      <button class="menu-toggle" id="vs-menu" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <h1 class="page-title">Inbox</h1>
    </div>

    <div class="emp-scroll">

<div class="card">

  <div class="card-header">
    <div>
      <h1>Tasks &amp; notifications</h1>
      <div class="sub" id="inbox-sub">—</div>
    </div>
    <div class="header-actions">
      <button class="link-btn" id="mark-all">Mark all as read</button>
    </div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-tab active" data-filter="all">All <span class="pill" id="c-all">0</span></button>
    <button class="filter-tab" data-filter="action">Action required <span class="pill" id="c-action">0</span></button>
    <button class="filter-tab" data-filter="info">Notifications <span class="pill" id="c-info">0</span></button>
  </div>

  <div class="task-list" id="task-list"><!-- injected by JS --></div>

</div>

    </div><!-- /emp-scroll -->
  </main>
</div><!-- /app -->

<div class="vs-toast" id="vs-toast">
  <svg viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5"/></svg>
  <span id="vs-toast-msg">Done</span>
</div>

<script>
(function(){
  /* ---------- toast ---------- */
  var t;
  function toast(msg){
    var el=document.getElementById('vs-toast');
    document.getElementById('vs-toast-msg').textContent=msg;
    el.classList.add('show'); clearTimeout(t);
    t=setTimeout(function(){el.classList.remove('show');},2400);
  }

  /* ---------- icons per task type ---------- */
  var ICONS = {
    leave:    '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.9"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>',
    goal:     '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.9"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="0.8" fill="currentColor"/></svg>',
    birthday: '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.9"><path d="M4 20h16v-8H4z"/><path d="M4 14c2 0 2 1.5 4 1.5S10 14 12 14s2 1.5 4 1.5S18 14 20 14"/><path d="M12 4v4M9 6.5a1.5 1.5 0 0 0 3 0M12 6.5a1.5 1.5 0 0 0 3 0"/></svg>',
    doc:      '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.9"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4M9 13h6M9 17h6"/></svg>',
    recruit:  '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.9"><circle cx="11" cy="11" r="6.5"/><path d="M16 16l4.5 4.5"/></svg>',
    anniv:    '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.9"><path d="M12 15a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/><path d="M9.5 14L8 22l4-2 4 2-1.5-8"/></svg>'
  };
  var LABELS = {
    leave:'Leave request', goal:'Goals approval', birthday:'Birthday',
    doc:'Document', recruit:'Recruitment', anniv:'Anniversary'
  };

  /* ---------- sample tasks ----------
     kind: 'action' (needs a decision) or 'info' (just a heads-up) */
  var tasks = [
    { id:1, type:'leave',    kind:'action', title:'Leave request — Sara Ahmed',
      desc:'Regular leave, 4 days (13–16 Jul 2026). Awaiting your approval.',
      time:'10 min ago', read:false, link:'Leaves.html' },
    { id:2, type:'goal',     kind:'action', title:'Goals approval — Omar Tarek',
      desc:'2 Q3 goals submitted and waiting for review.',
      time:'40 min ago', read:false, link:'Goals.html' },
    { id:3, type:'recruit',  kind:'action', title:'New candidate — Backend Engineer',
      desc:'Mona Fathy scored 95% on AI evaluation. Ready for human review.',
      time:'1 hour ago', read:false, link:'Recruitment.html' },
    { id:4, type:'birthday', kind:'info',   title:'Birthday today — Karim Nour',
      desc:'Karim from Engineering is celebrating a birthday today. 🎉',
      time:'Today', read:false, link:null },
    { id:5, type:'doc',      kind:'action', title:'Missing document — Sara Ahmed',
      desc:'Birth Certificate is marked mandatory but has not been uploaded yet.',
      time:'2 hours ago', read:false, link:'Documents.html' },
    { id:6, type:'anniv',    kind:'info',   title:'Work anniversary — Rania Adel',
      desc:'Rania completes 5 years at Valleysoft this week.',
      time:'Yesterday', read:true, link:null },
    { id:7, type:'leave',    kind:'action', title:'Leave request — Youssef Magdy',
      desc:'Casual leave, 1 day (03 Aug 2026). Awaiting your approval.',
      time:'Yesterday', read:true, link:'Leaves.html' }
  ];

  var currentFilter = 'all';

  function visible(){
    return tasks.filter(function(t){
      return currentFilter==='all' ? true : t.kind===currentFilter;
    });
  }

  function taskRow(t){
    var openBtn = t.link
      ? '<a class="mini-btn primary" href="'+t.link+'">'+
          '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>'+
          (t.kind==='action'?'Review':'Open')+'</a>'
      : '';
    var doneBtn = '<button class="mini-btn" data-act="done" data-id="'+t.id+'">'+
        '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>'+
        (t.kind==='action'?'Dismiss':'Got it')+'</button>';

    return '<div class="task'+(t.read?' read':'')+'" data-id="'+t.id+'">'+
      '<span class="unread-dot"></span>'+
      '<div class="task-icon ic-'+t.type+'">'+ICONS[t.type]+'</div>'+
      '<div class="task-body">'+
        '<div class="task-title">'+t.title+'</div>'+
        '<div class="task-desc">'+t.desc+'</div>'+
        '<div class="task-meta">'+
          '<span class="chip '+t.type+'">'+LABELS[t.type]+'</span>'+
          '<span class="task-time">'+t.time+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="task-actions">'+openBtn+doneBtn+'</div>'+
    '</div>';
  }

  function updateCounts(){
    var unread = tasks.filter(function(t){ return !t.read; }).length;
    document.getElementById('c-all').textContent    = tasks.length;
    document.getElementById('c-action').textContent = tasks.filter(function(t){ return t.kind==='action'; }).length;
    document.getElementById('c-info').textContent   = tasks.filter(function(t){ return t.kind==='info'; }).length;
    document.getElementById('inbox-sub').textContent =
      tasks.length ? unread+' unread · '+tasks.length+' total' : 'You are all caught up';
    var nb = document.getElementById('nav-inbox-badge');
    if(unread){ nb.textContent = unread; nb.style.display=''; } else { nb.style.display='none'; }
  }

  function render(){
    var list = document.getElementById('task-list');
    var rows = visible();
    if(!rows.length){
      list.innerHTML = '<div class="empty-state">'+
        '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M4 5h16v14H4z"/><path d="M4 8l8 5 8-5"/></svg>'+
        '<div>Nothing here — you are all caught up.</div></div>';
    } else {
      list.innerHTML = rows.map(taskRow).join('');
    }
    updateCounts();
  }

  /* ---------- interactions ---------- */
  document.getElementById('task-list').addEventListener('click', function(e){
    var btn = e.target.closest('[data-act="done"]');
    if(!btn) return;
    var id = Number(btn.dataset.id);
    tasks = tasks.filter(function(t){ return t.id!==id; });
    render();
    toast('Task cleared');
  });

  document.getElementById('filter-bar').addEventListener('click', function(e){
    var tab = e.target.closest('.filter-tab');
    if(!tab) return;
    currentFilter = tab.dataset.filter;
    document.querySelectorAll('.filter-tab').forEach(function(el){
      el.classList.toggle('active', el===tab);
    });
    render();
  });

  document.getElementById('mark-all').addEventListener('click', function(){
    tasks.forEach(function(t){ t.read = true; });
    render();
    toast('All marked as read');
  });

  /* ---------- sidebar (shared) ---------- */
  document.querySelectorAll('.nav-item[data-page]').forEach(function(item){
    item.addEventListener('click',function(){
      toast(item.dataset.page+' — coming soon in this mockup');
      document.getElementById('sidebar').classList.remove('open');
    });
  });
  var mt=document.getElementById('vs-menu');
  if(mt) mt.addEventListener('click',function(){ document.getElementById('sidebar').classList.toggle('open'); });

  render();
})();
</script>

</body>
</html>
